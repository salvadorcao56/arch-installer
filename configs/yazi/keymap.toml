[keys]
manager = [
  { on = "q", run = "quit", desc = "Quit" },
  { on = "<C-q>", run = "close", desc = "Close" },
  { on = "h", run = "leave", desc = "Leave" },
  { on = "l", run = "open", desc = "Open" },
  { on = "j", run = "arrow -1", desc = "Arrow up" },
  { on = "k", run = "arrow 1", desc = "Arrow down" },
  { on = "g", run = "arrow -1000000", desc = "Go to top" },
  { on = "G", run = "arrow 1000000", desc = "Go to bottom" },
  { on = "<Enter>", run = "enter", desc = "Enter" },
  { on = "<Backspace>", run = "leave", desc = "Back" },
  { on = "<TAB>", run = "toggle", desc = "Select" },
  { on = " ", run = "toggle", desc = "Toggle selection" },
  { on = "v", run = "visual_mode", desc = "Visual mode" },
  { on = "d", run = "delete", desc = "Delete" },
  { on = "y", run = "yank", desc = "Copy" },
  { on = "p", run = "paste", desc = "Paste" },
  { on = "r", run = "rename", desc = "Rename" },
  { on = "dd", run = "cut", desc = "Cut" },
  { on = "yy", run = "yank", desc = "Copy" },
  { on = "pp", run = "paste", desc = "Paste" },
  { on = "~", run = "toggle_hidden", desc = "Toggle hidden" },
  { on = "gg", run = "arrow -1000000", desc = "Go to top" },
  { on = "/", run = "find --smart-case", desc = "Find" },
  { on = "n", run = "find_next", desc = "Find next" },
  { on = "N", run = "find_prev", desc = "Find previous" },
  { on = "<C-r>", run = "render", desc = "Reload" },
  { on = "<C-n>", run = "create", desc = "Create file" },
  { on = "o", run = "open", desc = "Open" },
  { on = "O", run = "open --hovered", desc = "Open hovered" },
  { on = "t", run = "open --interactive", desc = "Open interactive" },
  { on = "E", run = "reveal", desc = "Reveal" },
  { on = "z", run = "submit --hidden", desc = "Hidden submit" },
  { on = "a", run = "rename --append", desc = "Append rename" },
  { on = "I", run = "rename --prepend", desc = "Prepend rename" },
  { on = "c", run = "cancel", desc = "Cancel" },
  { on = "b", run = "back", desc = "Go back" },
  { on = "1", run = "tab_switch 1", desc = "Tab 1" },
  { on = "2", run = "tab_switch 2", desc = "Tab 2" },
  { on = "3", run = "tab_switch 3", desc = "Tab 3" },
  { on = "4", run = "tab_switch 4", desc = "Tab 4" },
  { on = "5", run = "tab_switch 5", desc = "Tab 5" },
  { on = "<C-n>", run = "tab_create", desc = "New tab" },
  { on = "<C-w>", run = "tab_close", desc = "Close tab" },
  { on = "<S-h>", run = "tab_swap -1", desc = "Swap tab left" },
  { on = "<S-l>", run = "tab_swap 1", desc = "Swap tab right" },
  { on = "<F12>", run = "help", desc = "Show keymaps" },
]
