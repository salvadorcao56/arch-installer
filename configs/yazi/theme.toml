footer = { fg = "#ebdbb2", bg = "#1d2021" }

[filetype]
rules = [
  { mime = "image/*", fg = "#d79921" },
  { mime = "{audio,video}/*", fg = "#d3869b" },
  { mime = "application/*zip", fg = "#cc241d" },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#cc241d" },
  { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#8ec07c" },
  { mime = "*/*", is = "orphan", bg = "#cc241d" },
  { mime = "*/*", is = "exec", fg = "#98971a" },
  { mime = "*/*", name = "*/", fg = "#458588" },
  { mime = "*/*", fg = "#ebdbb2" },
]
