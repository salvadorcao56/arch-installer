active = { fg = "#cdd6f4", bg = "#45475a" }
inactive = { fg = "#cdd6f4" }

[input]
border = { fg = "#89dceb" }
title = { fg = "#89dceb" }
value = { fg = "#cba6f7" }
selected = { bg = "#45475a" }

[cmp]
border = { fg = "#89dceb" }
active = { fg = "#cdd6f4", bg = "#313244" }
inactive = { fg = "#cdd6f4" }
icon_file = ""
icon_folder = ""
icon_command = ""

[tasks]
border = { fg = "#94e2d5" }
title = { fg = "#94e2d5" }
hovered = { fg = "#cdd6f4", bg = "#45475a" }

[which]
cols = 3
mask = { bg = "#181825" }
cand = { fg = "#89dceb" }
rest = { fg = "#89b4fa" }
desc = { fg = "#cba6f7" }
