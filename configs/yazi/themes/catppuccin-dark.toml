separator_style = { fg = "#585b70" }

[confirm]
border = { fg = "#89dceb" }
title = { fg = "#94e2d5" }
content = {}
list = {}
btn_yes = { bg = "#45475a" }
btn_no = {}
btn_labels = ["  [Y]es  ", "  (N)o  "]

[spot]
border = { fg = "#94e2d5" }
title = { fg = "#94e2d5" }

[notify]
title_info = { fg = "#89dceb" }
title_warn = { fg = "#f9e2af" }
title_error = { fg = "#f38ba8" }
icon_error = ""
icon_warn = ""
icon_info = ""

[help]
on = { fg = "#a6e3a1" }
run = { fg = "#cba6f7" }
desc = { fg = "#89dceb" }
hovered = { bg = "#313244" }
footer = { fg = "#cdd6f4", bg = "#181825" }

[filetype]
rules = [
  { mime = "image/*", fg = "#f9e2af" },
  { mime = "{audio,video}/*", fg = "#cba6f7" },
  { mime = "application/*zip", fg = "#f38ba8" },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#f38ba8" },
  { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#89dceb" },
  { mime = "*/*", is = "orphan", bg = "#f38ba8" },
  { mime = "*/*", is = "exec", fg = "#a6e3a1" },
  { mime = "*/*", name = "*/", fg = "#89b4fa" },
  { mime = "*/*", fg = "#cdd6f4" },
]
