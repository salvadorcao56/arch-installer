[mgr]
cwd = { fg = "#1e66f5", italic = true }
hovered = { bg = "#ccd0da" }
preview_hovered = { bg = "#ccd0da" }
find_keyword = { fg = "#dce0e8", bg = "#df8e1d", bold = true }
find_position = { fg = "#04a5e5", bg = "#bcc0cc", bold = true }
marker_copied = { fg = "#40a02b", bg = "#40a02b" }
marker_cut = { fg = "#d20f39", bg = "#d20f39" }
marker_marked = { fg = "#8839ef", bg = "#8839ef" }
marker_selected = { fg = "#1e66f5", bg = "#1e66f5" }
count_copied = { fg = "#dce0e8", bg = "#40a02b" }
count_cut = { fg = "#dce0e8", bg = "#d20f39" }
count_selected = { fg = "#dce0e8", bg = "#1e66f5" }
border_symbol = "│"
