[manager]
ratio = [1, 4, 3]
sort_by = "alphabetical"
sort_dir_first = true
show_hidden = true
show_symlink = true

[preview]
max_width = 600
max_height = 900
cache_dir = "/tmp/yazi-cache"

[opener]
edit = [{ run = 'vim "$@"', block = true }]
open = [{ run = 'xdg-open "$@"' }]
reveal = [{ run = 'thunar "$1"' }]
play = [{ run = 'mpv "$@"', block = true, orphan = true }]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "image/*", use = "open" },
  { mime = "video/*", use = "play" },
  { mime = "audio/*", use = "play" },
  { mime = "application/json", use = "edit" },
  { mime = "application/pdf", use = "open" },
]
